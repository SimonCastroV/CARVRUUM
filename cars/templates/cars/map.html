{% extends "base.html" %}
{% block title %}Mapa de vehículos | CarVRuuum{% endblock %}

{% block content %}

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<div class="relative">

  <!-- Header flotante -->
  <div class="absolute left-0 right-0 top-0 z-[999] px-4 pt-4 flex justify-center pointer-events-none">
    <div class="pointer-events-auto rounded-2xl border border-slate-200/80 bg-white/90 px-6 py-3 shadow-lg backdrop-blur dark:border-slate-700/80 dark:bg-slate-900/90 flex items-center gap-4">
      <div>
        <h1 class="text-base font-bold text-slate-800 dark:text-white"> Vehículos en Colombia</h1>
        <p class="text-xs text-slate-500 dark:text-slate-400">{{ total_cars }} vehículo{{ total_cars|pluralize }} disponible{{ total_cars|pluralize }}</p>
      </div>
      <div class="h-8 w-px bg-slate-200 dark:bg-slate-700"></div>
      <p class="text-xs text-slate-500 dark:text-slate-400">Haz clic en un marcador para ver los carros</p>
    </div>
  </div>

  <!-- Mapa -->
  <div id="map" style="height: calc(100vh - 65px); width: 100%;"></div>

</div>

<style>
  .leaflet-popup-content-wrapper {
    border-radius: 16px !important;
    padding: 0 !important;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15) !important;
    border: 1px solid rgba(226,232,240,0.8);
    min-width: 280px;
    max-width: 320px;
  }
  .leaflet-popup-content {
    margin: 0 !important;
    width: 100% !important;
  }
  .leaflet-popup-tip-container { display: none; }

  .dark .leaflet-popup-content-wrapper {
    background: #0f172a;
    border-color: rgba(51,65,85,0.8);
  }

  /* Scrollbar bonito en el popup */
  .popup-cars::-webkit-scrollbar { width: 4px; }
  .popup-cars::-webkit-scrollbar-track { background: transparent; }
  .popup-cars::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
</style>

<script>
  const CITIES = {{ cities_json|safe }};
  const isDark  = document.documentElement.classList.contains("dark");

  // ── Mapa base ──────────────────────────────────────────────────
  const map = L.map("map", {
    center: [4.5709, -74.2973],
    zoom: 6,
    zoomControl: false,
  });

  L.control.zoom({ position: "bottomright" }).addTo(map);

  // Tile oscuro o claro según el tema
  const tileLight = "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png";
  const tileDark  = "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png";

  L.tileLayer(isDark ? tileDark : tileLight, {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19,
  }).addTo(map);

  // ── Ícono personalizado por ciudad ────────────────────────────
  function makeIcon(count) {
    const size = count > 10 ? 52 : count > 5 ? 46 : 40;
    return L.divIcon({
      className: "",
      html: `
        <div style="
          width:${size}px; height:${size}px;
          background: linear-gradient(135deg, #2563eb, #4f46e5);
          border-radius: 50% 50% 50% 0;
          transform: rotate(-45deg);
          box-shadow: 0 4px 14px rgba(37,99,235,0.5);
          border: 3px solid white;
          display:flex; align-items:center; justify-content:center;
        ">
          <div style="transform:rotate(45deg); color:white; font-weight:800; font-size:${count>99?10:13}px; font-family:sans-serif; line-height:1;">
            ${count}
          </div>
        </div>`,
      iconSize:   [size, size],
      iconAnchor: [size / 2, size],
      popupAnchor:[0, -(size + 4)],
    });
  }

  // ── Popup HTML para cada ciudad ───────────────────────────────
  function buildPopup(city) {
    const header = `
      <div style="padding:16px 16px 12px; border-bottom:1px solid #e2e8f0;">
        <p style="margin:0; font-weight:700; font-size:15px; color:#1e293b;">📍 ${city.name}</p>
        <p style="margin:4px 0 0; font-size:12px; color:#64748b;">${city.cars.length} vehículo${city.cars.length !== 1 ? 's' : ''} disponible${city.cars.length !== 1 ? 's' : ''}</p>
      </div>`;

    const carCards = city.cars.map(car => {
      const img = car.image
        ? `<img src="${car.image}" style="width:100%; height:90px; object-fit:cover; border-radius:10px; margin-bottom:8px;">`
        : `<div style="width:100%; height:90px; background:#f1f5f9; border-radius:10px; margin-bottom:8px; display:flex; align-items:center; justify-content:center; font-size:28px;">🚘</div>`;
      return `
        <a href="${car.url}" style="display:block; text-decoration:none; background:#f8fafc; border-radius:12px; padding:10px; transition:background .15s;"
           onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='#f8fafc'">
          ${img}
          <p style="margin:0; font-weight:600; font-size:13px; color:#1e293b;">${car.make} ${car.model}</p>
          <p style="margin:2px 0 0; font-size:11px; color:#64748b;">${car.year} · ${car.price}</p>
        </a>`;
    }).join("");

    return `
      <div>
        ${header}
        <div class="popup-cars" style="padding:12px; max-height:320px; overflow-y:auto; display:flex; flex-direction:column; gap:8px;">
          ${carCards}
        </div>
      </div>`;
  }

  // ── Crear marcadores ──────────────────────────────────────────
  CITIES.forEach(city => {
    if (!city.cars.length) return;
    const marker = L.marker([city.lat, city.lng], { icon: makeIcon(city.cars.length) });
    marker.bindPopup(buildPopup(city), {
      maxWidth: 320,
      minWidth: 280,
    });
    marker.addTo(map);
  });
</script>

{% endblock %}
