<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carvrum | Home</title>
</head>
<body>

    <h1>Bienvenido, {{ username }}</h1>

    {% if ciudad %}
        <p>Ciudad: {{ ciudad }}</p>
    {% else %}
        <p>Ciudad no registrada</p>
    {% endif %}

    <form method="post" action="{% url 'logout' %}">
    {% csrf_token %}
    <button type="submit">Cerrar sesión</button>
</form>

</body>
</html>
